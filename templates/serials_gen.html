{% extends "base_tmp.html" %}
{% block content %}
<div class="card shadow-sm mb-4">
    <div class="card-body p-3 bg-light border-0">
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">

            <div class="d-flex align-items-center">
                <div class="bg-primary text-white rounded p-2 me-3">
                    <i class="bi bi-gear-fill"></i> <span style="font-size: 1.2rem;">⚙️</span>
                </div>
                <h5 class="mb-0 text-dark fw-bold" style="white-space: nowrap;">{{ title }}</h5>
            </div>

            <form class="m-0" method="post" style="flex-grow: 1;">
                <div class="row g-2 align-items-end">

                    <div class="col-6 col-md-3 col-lg-2">
                        <label class="form-label small fw-bold text-muted mb-1">Префікс</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white">ABC</span>
                            <input class="form-control fw-bold" type="text" name="pref" value="{{ pref }}" >
                        </div>
                    </div>

                    <div class="col-6 col-md-3 col-lg-2">
                        <label class="form-label small fw-bold text-muted mb-1">Дата (код)</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white">📅</span>
                            <input class="form-control" type="text" name="date"  >
                        </div>
                    </div>

                    <div class="col-6 col-md-2 col-lg-2">
                        <label class="form-label small fw-bold text-muted mb-1">Довжина</label>
                        <input class="form-control form-control-sm text-center" type="number" name="len" value="{{ len }}" min="1">
                    </div>

                    <div class="col-6 col-md-2 col-lg-2">
                        <label class="form-label small fw-bold text-muted mb-1">Рядки</label>
                        <input class="form-control form-control-sm text-center" type="number" name="crow" value="{{ crow }}" min="1">
                    </div>

                    <div class="col-12 col-md-2 col-lg-2">
                        <button class="btn btn-success btn-sm w-100 fw-bold shadow-sm" type="submit">
                            ✨ Генерувати
                        </button>
                        <button class="btn btn-secondary btn-sm w-100 fw-bold shadow-sm" onclick="copyTable()">
                            📋 Копіювати
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<table id="tList">
   <thead>
    <tr>
       <th>SERIALS</th>
    </tr>
   </thead>
   <tbody>
{% for row in data %}
    <tr>
       <td> {{ row }}</td>
    </tr>
{% endfor %}
    </tbody>
</table>

<script src="{{ url_for('static', filename='js/tables.js') }}"></script>

{% endblock %}
